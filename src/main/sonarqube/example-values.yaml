image:
  repository: sonarqube
  tag: community

postgresql:
  enabled: false

jdbcOverwrite:
  enable: false

service:
  type: NodePort
  nodePort: 30900
  port: 9000

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

sonarWebContext: ""

# Required by newer chart versions for the monitoring endpoint
monitoringPasscode: "change-me-sonarqube-monitoring"

# Enable SonarQube Community Build (formerly Community Edition)
community:
  enabled: true
